{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="card auth-card p-4">
  <h3 class="text-center mb-3"><i class="fa-solid fa-key text-primary"></i> Reset Password</h3>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Registered Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">New Password</label>
      <input type="password" name="new_password" class="form-control" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
  </form>
  <p class="text-center mt-3 mb-0"><a href="{{ url_for('login') }}">Back to login</a></p>
</div>
<p class="text-center text-muted small mt-2">Note: In this demo version, resetting works directly without email verification.</p>
{% endblock %}
