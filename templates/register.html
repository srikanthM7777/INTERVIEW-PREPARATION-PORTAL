{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card auth-card p-4">
  <h3 class="text-center mb-3"><i class="fa-solid fa-user-plus text-primary"></i> Create Account</h3>
  <form method="POST" action="{{ url_for('register') }}">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required minlength="6">
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">College</label>
        <input type="text" name="college" class="form-control">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Branch</label>
        <input type="text" name="branch" class="form-control">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Year</label>
        <select name="year" class="form-select">
          <option>1st Year</option>
          <option>2nd Year</option>
          <option selected>3rd Year</option>
          <option>4th Year</option>
        </select>
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>
  <p class="text-center mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
