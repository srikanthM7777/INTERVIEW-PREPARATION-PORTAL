{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="card auth-card p-4">
  <h3 class="text-center mb-3"><i class="fa-solid fa-user-shield text-primary"></i> Admin Login</h3>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Admin Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-dark w-100">Login as Admin</button>
  </form>
  <p class="small text-muted mb-0 text-center mt-3">Demo admin: admin@portal.com / admin123</p>
</div>
{% endblock %}
