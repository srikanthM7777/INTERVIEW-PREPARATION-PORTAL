{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card auth-card p-4">
  <h3 class="text-center mb-3"><i class="fa-solid fa-right-to-bracket text-primary"></i> Login</h3>
  <form method="POST" action="{{ url_for('login') }}">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>
  <div class="d-flex justify-content-between mt-3">
    <a href="{{ url_for('forgot_password') }}" class="small">Forgot Password?</a>
    <a href="{{ url_for('register') }}" class="small">Create an account</a>
  </div>
  <hr>
  <p class="small text-muted mb-0 text-center">Demo login: demo@portal.com / demo123</p>
</div>
{% endblock %}
